---

name: lint

on: push

jobs:

  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP and Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Install Dependencies
        run: make install

      - name: Security Checks
        run: composer audit

      - name: Run Linter
        run: make lint
